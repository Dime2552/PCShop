<div class="max-w-md mx-auto mt-12 bg-white p-8 rounded-xl shadow-sm border border-gray-100">
  <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">
    {{ isLoginMode() ? 'Sign In' : 'Create Account' }}
  </h2>

  <form (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
    
    @if (!isLoginMode()) {
      <div class="flex gap-4">
        <div class="flex flex-col gap-2 w-1/2">
          <label for="firstName" class="text-sm font-medium text-gray-700">First Name</label>
          <input pInputText id="firstName" name="firstName" [(ngModel)]="firstName" required class="w-full" />
        </div>
        <div class="flex flex-col gap-2 w-1/2">
          <label for="lastName" class="text-sm font-medium text-gray-700">Last Name</label>
          <input pInputText id="lastName" name="lastName" [(ngModel)]="lastName" required class="w-full" />
        </div>
      </div>
    }

    <div class="flex flex-col gap-2">
      <label for="email" class="text-sm font-medium text-gray-700">Email Address</label>
      <input pInputText id="email" type="email" name="email" [(ngModel)]="email" required class="w-full" />
    </div>

    <div class="flex flex-col gap-2">
      <label for="password" class="text-sm font-medium text-gray-700">Password</label>
      <p-password [(ngModel)]="password" name="password" [toggleMask]="true" [feedback]="!isLoginMode()" styleClass="w-full" inputStyleClass="w-full"></p-password>
    </div>

    <p-button 
      [label]="isLoginMode() ? 'Login' : 'Register'" 
      type="submit" 
      styleClass="w-full mt-4">
    </p-button>

  </form>

  <div class="mt-6 text-center text-sm text-gray-600">
    {{ isLoginMode() ? "Don't have an account?" : "Already have an account?" }}
    <button (click)="toggleMode()" class="text-blue-600 font-bold hover:underline ml-1">
      {{ isLoginMode() ? 'Sign Up' : 'Log In' }}
    </button>
  </div>
</div>
