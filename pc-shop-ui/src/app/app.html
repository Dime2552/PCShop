<div class="min-h-screen bg-gray-50 flex flex-col">
  <!-- Navbar -->
  <header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="container mx-auto px-4 h-16 flex items-center justify-between">
      <a routerLink="/" class="font-bold text-2xl text-blue-600 tracking-tight">PC Parts e-Shop</a>
      
      <nav class="flex items-center gap-6">
        <a routerLink="/" class="text-gray-600 hover:text-blue-600 font-medium">Catalog</a>
        
        <!-- Cart -->
        <a routerLink="/cart" class="text-gray-600 hover:text-blue-600 font-medium cursor-pointer flex items-center gap-1 relative">
          <i class="pi pi-shopping-cart text-xl"></i>
          @if (cartItemsCount > 0) {
            <span class="absolute -top-2 -right-3 bg-red-500 text-white rounded-full px-1.5 py-0.5 text-[10px] font-bold">
              {{ cartItemsCount }}
            </span>
          }
        </a>

        <div class="w-px h-6 bg-gray-200"></div> <!-- Divider -->

        <!-- Auth section -->
        @if (authService.currentUser(); as user) {
          <div class="flex items-center gap-4">
            <span class="text-sm font-medium text-gray-700">Hi, {{ user.firstName }}</span>
            <button (click)="logout()" class="text-sm text-red-500 hover:text-red-700 font-medium" title="Logout">
              <i class="pi pi-sign-out"></i>
            </button>
          </div>
        } @else {
          <a routerLink="/auth" class="text-sm font-bold bg-blue-50 text-blue-600 px-4 py-2 rounded-lg hover:bg-blue-100 transition">
            Sign In
          </a>
        }
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <main class="grow container mx-auto px-4 py-8">
    <router-outlet></router-outlet>
  </main>
</div>

<p-toast position="bottom-right"></p-toast>
